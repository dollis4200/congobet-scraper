name: CongoBet Auto Scraper

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Mode scraping"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - 1x2
          - gng
          - results

  push:
    branches: [main]
    paths:
      - "scraper.py"
      - "config.py"
      - "consolidate.py"
      - "app.py"
      - ".github/workflows/scrape.yml"

concurrency:
  group: congobet-auto-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Prepare data directory
        run: mkdir -p data

      - name: Scraping cycle 1 — odds first
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="all"; fi
          echo "MODE=$MODE"

          case "$MODE" in
            results)
              python scraper.py results
              ;;
            1x2)
              python scraper.py 1x2
              ;;
            gng)
              python scraper.py gng
              ;;
            all)
              python scraper.py 1x2
              python scraper.py gng
              ;;
            *)
              echo "Mode invalide: $MODE"
              exit 1
              ;;
          esac

      - name: Consolidate current snapshot
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="all"; fi
          if [ "$MODE" != "results" ]; then
            python consolidate.py
          fi

      - name: Commit & push snapshot after cycle 1
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true

          if git diff --staged --quiet; then
            echo "Aucun changement après cycle 1"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            git commit -m "⚡ Odds snapshot: $TIMESTAMP"
            git push
            echo "✓ Snapshot cycle 1 poussé"
          fi

      - name: Wait before results refresh
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="all"; fi
          if [ "$MODE" = "all" ]; then
            sleep 100
          fi

      - name: Scraping cycle 2 — results only
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="all"; fi

          if [ "$MODE" = "all" ] || [ "$MODE" = "results" ]; then
            python scraper.py results
            python consolidate.py
          else
            echo "Cycle 2 ignoré pour mode=$MODE"
          fi

      - name: Commit & push snapshot after cycle 2
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="all"; fi

          if [ "$MODE" = "all" ] || [ "$MODE" = "results" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ || true

            if git diff --staged --quiet; then
              echo "Aucun changement après cycle 2"
            else
              TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
              git commit -m "✅ Results snapshot: $TIMESTAMP"
              git push
              echo "✓ Snapshot cycle 2 poussé"
            fi
          fi

      - name: Show scraping status
        if: always()
        run: |
          echo "=== Status scraper ==="
          cat data/scraper_status.json 2>/dev/null || echo "Pas de fichier status"
          echo ""
          echo "=== Fichiers générés ==="
          ls -lh data/ 2>/dev/null || echo "Dossier data vide"
